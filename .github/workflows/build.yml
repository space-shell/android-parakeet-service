name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/nix
            /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-keys: |
            nix-${{ runner.os }}-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Cache model assets
        uses: actions/cache@v4
        with:
          path: app/src/main/assets
          key: model-assets-${{ hashFiles('app/build.gradle.kts') }}
          restore-keys: |
            model-assets-

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: target
          key: rust-${{ runner.os }}-aarch64-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'src/lib.rs') }}
          restore-keys: |
            rust-${{ runner.os }}-aarch64-

      - name: Build debug APK
        run: nix develop --command bash -c 'android-build-env -c "./gradlew assembleDebug"'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: parakeet-service-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: app/build/outputs/apk/debug/*.apk
